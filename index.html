<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="icon" type="image/png" sizes="32x32" href="./images/nappmenu.png" />
    <link rel="stylesheet" href="css/styles.css" />
    <title>N laundry WEB UI | Login Screen</title>
  </head>
  <body>     

    <main class="loginscreenc">
     <section class="horizontalalignment">
        <div class="left_image_Section"> 
        <picture>
          
          <source media="(min-width: 80em)" srcset="images/Laundry_app_logo3.png" width="606" height="312"  />
          <source media="(min-width: 40em)" srcset="images/Laundry_app_logo3.png" width="392" height="205"  />
          <img class="loginmenuimage" src="images/Laundry_app_logo3.png" width="642" height="308" 
               alt="login menu image logo called N Laundry Dry cleaners">
        </picture>
        
        <div class="align_CenterPlease">
            <p class="version40c">
            
        </p>
        </div>
        

        </div>
        <div class="loginmenuborder">
            <div class="alignstuffcenter">
                <picture>
                    <source media="(min-width: 120em)" srcset="images/bg_iron.png" width="96" height="96" />
                    <source media="(min-width: 80em)" srcset="images/bg_iron.png" width="70" height="70" />
                    <source media="(min-width: 40em)" srcset="images/bg_iron.png" width="50" height="50" />
                    <img class="blueiron" src="images/bg_iron.png" alt="login menu image logo called N Laundry Dry cleaners">  
                    </picture>
                    <picture>
                    <source media="(min-width: 120em)" srcset="images/bg_brown_coat.png" width="96" height="96" />
                    <source media="(min-width: 80em)" srcset="images/bg_brown_coat.png" width="70" height="70" />
                    <source media="(min-width: 40em)" srcset="images/bg_brown_coat.png" width="50" height="50" />
                    <img class="brownjacket"  src="images/bg_brown_coat.png" alt="login menu image logo called N Laundry Dry cleaners"> 
                    </picture>     
            </div>
            <p class="pleaseloginauthorise">
                Please Login Authorised Personel Only
            </p>
            <div class="margin">
                <p class="name"> Name: <input class="nametextbox"/></p>
                
              </div>

              <div class="margin">
                <p class="password">Password: <input class="passwordtextbox"/> </p>
                
              </div>
            

            <div class="margin_button horizontalalignment">

                <a href="hub.html"><button class="loginbutton loginbtntext">Press>>> Log in </button></a>
                <button class="forgotpasswordbutton forgotpasswordbtntex">Forgot password</button>

            </div>
            <p class="developedbysimulakra">
                Developed By Simulakra Technologies Version 4.0.C
            </p>
        </div>

     </section>
    </main>    
  </body>    
</html>
